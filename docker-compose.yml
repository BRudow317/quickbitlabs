services:
  oracle19c:
    image: container-registry.oracle.com/database/enterprise:19.3.0.0
    container_name: dev
    environment:
      - ORACLE_PWD=${QBLPDB_PWD}
      - ORACLE_PDB=${QBLPDB_NAME}
      - ORACLE_CHARACTERSET=AL32UTF8
    ports:
      - "1521:1521"
    volumes:
      - ./build/sql:/opt/oracle/scripts/setup